document.addEventListener('change', e => {
  if(e.target.id === 'import-file'){ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=''; return; }
  const el = e.target.closest('[data-change]');
  if(!el) return;
  const kind = el.dataset.change, val = el.value, id = el.dataset.id;
  if(kind === 'switch-case'){ app.currentCaseId = parseInt(val,10); app.settingsOpen = false; openTrackId = null; renderAll(); return; }
  if(kind === 'anchor'){ CC().anchor = val; renderAll(); return; }
  if(kind === 'ms-label'){ const m = milestone(id); if(m) m.label = val.trim() || m.label; renderAll(); return; }
  if(kind === 'ms-date'){ const m = milestone(id); if(m) m.date = val || null; renderAll(); return; }
  if(kind === 'party-name'){ const p = party(id); if(p) p.name = val.trim() || p.name; renderAll(); return; }
  if(kind === 'party-email'){ const p = party(id); if(p) p.email = val.trim() || undefined; renderAll(); return; }
  if(kind === 'party-kind'){ const p = party(id); if(p) p.kind = val; renderAll(); return; }
  if(kind === 'set-importance'){ const t = CC().tracks.find(x => x.id === id); if(t) t.importance = val; renderAll(); return; }
  if(kind === 'theme'){ applyTheme(val); renderAll(); return; }
  // 履歴から呼び出し（再描画せずフォームに流し込む）
  if(kind === 'recall-block'){ if(val) prefillBlockFromBank(val); return; }
  if(kind === 'recall-span'){ if(val) prefillSpanFromBank(val); return; }
  // 大きな範囲ジャンプ（日付指定）
  if(kind === 'jump-date'){ if(val){ app.calOffset = dayDiff(val, ymd(TODAY)); renderAll(); } return; }
  // メモ・テンプレート管理の編集
  if(kind === 'mb-title'){ const e = findBank(id); if(e){ e.title = val.trim() || e.title; e.key = e.title + '|' + e.memo; } renderAll(); return; }
  if(kind === 'mb-memo'){ const e = findBank(id); if(e){ e.memo = val.trim(); e.key = e.title + '|' + e.memo; } renderAll(); return; }
  if(kind === 'mb-start'){ const e = findBank(id); if(e && e.start != null){ const m = timeToMin(val); if(!isNaN(m)) e.start = m; } renderAll(); return; }
  if(kind === 'mb-end'){ const e = findBank(id); if(e && e.start != null){ const m = timeToMin(val); if(!isNaN(m) && m > e.start) e.dur = m - e.start; } renderAll(); return; }
  // 小タスク：進捗% / メモ（展開エディタ）
  if(kind === 'item-progress'){ const it = itemIndex[id]; if(it){ let p = parseInt(val,10); it.progress = isNaN(p)?0:Math.max(0,Math.min(100,p)); } renderAll(); return; }
  if(kind === 'item-memo'){ const it = itemIndex[id]; if(it){ it.memo = val.trim() || undefined; } renderAll(); return; }
});

document.addEventListener('click', e => {
  const chk = e.target.closest('.item-check');
  if(chk){ e.stopPropagation(); toggleItem(chk.dataset.item); return; }
  // 細分化（微細タスク）チェック
  const sc = e.target.closest('.sub-check');
  if(sc){
    e.stopPropagation();
    const it = itemIndex[sc.dataset.item];
    const s = it && (it.subs||[]).find(x => x.id === sc.dataset.sub);
    if(s) s.done = !s.done;
    renderAll();
    return;
  }
  // 小タスクのタイトルをクリックで展開（メモ・進捗）
  const titleEl = e.target.closest('.item-title');
  if(titleEl && titleEl.dataset.item){
    e.stopPropagation();
    openItemId = (openItemId === titleEl.dataset.item) ? null : titleEl.dataset.item;
    renderAll();
    return;
  }

  const btn = e.target.closest('button[data-action]');
  if(btn){
    e.stopPropagation();
    const act = btn.dataset.action, tid = btn.dataset.track, id = btn.dataset.id;
    if(typeof birdOnTab === 'function') birdOnTab(act); // タブ操作で鳥が反応
    const c = CC();
    switch(act){
      case 'toggle-settings': app.settingsOpen = !app.settingsOpen; renderAll(); break;
      case 'toggle-backup': app.backupOpen = !app.backupOpen; renderAll(); break;
      case 'toggle-memo': app.memoOpen = !app.memoOpen; renderAll(); break;
      case 'memo-tab-time': app.memoTab = 'time'; renderAll(); break;
      case 'memo-tab-span': app.memoTab = 'span'; renderAll(); break;
      case 'archive-case': {
        const activeCases = app.cases.filter(x => !x.archived);
        if(activeCases.length <= 1){ alert('最後の案件はアーカイブできないよ。先に別の案件を作ってね。'); break; }
        c.archived = true;
        app.currentCaseId = app.cases.find(x => !x.archived).id;
        app.settingsOpen = false; openTrackId = null; renderAll(); break;
      }
      case 'restore-case': { const cc = app.cases.find(x => String(x.id) === id); if(cc) cc.archived = false; renderAll(); break; }
      case 'toggle-star': { const t = CC().tracks.find(x => x.id === tid); if(t) t.star = !t.star; renderAll(); break; }
      case 'toggle-star-filter': app.starFilter = !app.starFilter; renderAll(); break;
      case 'backup-close': app.backupOpen = false; renderAll(); break;
      case 'backup-copy': {
        const ta = document.getElementById('backup-text');
        ta.focus(); ta.select();
        let ok = false;
        try{ ok = document.execCommand('copy'); }catch(e){}
        if(navigator.clipboard && navigator.clipboard.writeText){ try{ navigator.clipboard.writeText(ta.value); ok = true; }catch(e){} }
        alert(ok ? 'コピーしたよ。安全な場所に貼り付けて保管してね。' : 'コピーできなかったので、枠内を選んで Ctrl+C でコピーしてね。');
        break;
      }
      case 'backup-restore': {
        const ta = document.getElementById('backup-text');
        alert(applyStateFromText(ta.value).msg);
        break;
      }
      case 'export': exportJson(); break;
      case 'import': document.getElementById('import-file').click(); break;
      case 'reset': resetAll(); break;
      case 'add-case': addCaseFromTemplate(); break;
      case 'rename-case': { const v = (document.getElementById('set-title').value||'').trim(); if(v){ c.title = v; renderAll(); } break; }
      case 'add-ms': {
        const label = (document.getElementById('new-ms-label').value||'').trim();
        if(!label){ document.getElementById('new-ms-label').focus(); break; }
        const date = document.getElementById('new-ms-date').value || null;
        const m = { id:'m'+(app.seqMs++), label, date };
        c.milestones.push(m);
        if(!c.anchor) c.anchor = m.id;
        renderAll(); break;
      }
      case 'del-ms': {
        c.milestones = c.milestones.filter(m => m.id !== id);
        if(c.anchor === id) c.anchor = (c.milestones[0] && c.milestones[0].id) || null;
        renderAll(); break;
      }
      case 'add-party': {
        const name = (document.getElementById('new-party-name').value||'').trim();
        if(!name){ document.getElementById('new-party-name').focus(); break; }
        const kind = document.getElementById('new-party-kind').value;
        const email = (document.getElementById('new-party-email').value||'').trim() || undefined;
        c.parties.push({ id:'p'+(app.seqParty++), name, kind, email });
        renderAll(); break;
      }
      case 'del-party': { c.parties = c.parties.filter(p => p.id !== id); renderAll(); break; }
      case 'toggle-time': app.timeMode = !app.timeMode; renderAll(); break;
      case 'time-close': app.timeMode = false; renderAll(); break;
      case 'cal-prev': app.calOffset -= 7; renderAll(); break;
      case 'cal-next': app.calOffset += 7; renderAll(); break;
      case 'cal-prev-month': shiftCal('month', -1); break;
      case 'cal-next-month': shiftCal('month', 1); break;
      case 'cal-prev-year': shiftCal('year', -1); break;
      case 'cal-next-year': shiftCal('year', 1); break;
      case 'cal-today': app.calOffset = 0; renderAll(); break;
      case 'open-day': app.selectedDate = btn.dataset.date; renderAll(); break;
      case 'day-back': app.selectedDate = null; renderAll(); break;
      case 'toggle-orient': app.ganttOrient = app.ganttOrient === 'vertical' ? 'horizontal' : 'vertical'; renderAll(); break;
      case 'toggle-notify': {
        const arr = (CC().schedule||{})[app.selectedDate] || [];
        const b = arr.find(x => x.id === btn.dataset.block);
        if(b) b.notify = !b.notify;
        renderAll(); break;
      }
      case 'add-block': addBlock(); break;
      case 'add-span': addSpan(); break;
      case 'templatize-block': {
        const ti = (val('block-title') || '予定');
        const memo = (val('block-memo') || '');
        const sm = timeToMin(val('block-start')), em = timeToMin(val('block-end'));
        let s = isNaN(sm) ? 540 : sm, en = isNaN(em) ? s + 60 : em;
        const e2 = recordBank(ti, memo, s, Math.max(15, en - s)); e2.template = true; renderAll(); break;
      }
      case 'templatize-span': {
        const e2 = recordBank(val('span-title') || 'タスク', val('span-memo') || '', null, null);
        e2.template = true; renderAll(); break;
      }
      case 'toggle-mb-template': { const e2 = findBank(id); if(e2) e2.template = !e2.template; renderAll(); break; }
      case 'del-mb': { CC().memoBank = (CC().memoBank||[]).filter(x => x.id !== id); renderAll(); break; }
      case 'rename-span': {
        const s = (CC().spans||[]).find(x => x.id === btn.dataset.span);
        if(s){ const v = prompt('日をまたぐタスク名を変更：', s.title); if(v !== null && v.trim()){ s.title = v.trim(); renderAll(); } }
        break;
      }
      case 'del-span': {
        CC().spans = (CC().spans||[]).filter(x => x.id !== btn.dataset.span);
        renderAll(); break;
      }
      case 'del-block': {
        const arr = (CC().schedule||{})[app.selectedDate] || [];
        const bi = arr.findIndex(b => b.id === btn.dataset.block);
        if(bi >= 0) arr.splice(bi, 1);
        renderAll(); break;
      }
      case 'view-active': app.view = 'active'; openTrackId = null; renderAll(); break;
      case 'view-archived': app.view = 'archived'; openTrackId = null; renderAll(); break;
      case 'archive-track': archiveTrack(tid); break;
      case 'restore-track': restoreTrack(tid); break;
      case 'archive-done': archiveDone(); break;
      case 'add-track': addTrackFromForm(); break;
      case 'add-item': addItemFromForm(tid); break;
      case 'item-expand': openItemId = (openItemId === btn.dataset.item) ? null : btn.dataset.item; renderAll(); break;
      case 'rename-item': renameItem(btn.dataset.item); break;
      case 'add-sub': addSub(btn.dataset.item); break;
      case 'del-sub': {
        const it = itemIndex[btn.dataset.item];
        if(it) it.subs = (it.subs||[]).filter(s => s.id !== btn.dataset.sub);
        renderAll(); break;
      }
      case 'palette-open': {
        const pop = btn.closest('.item-row').querySelector('.palette-pop');
        if(pop) pop.hidden = !pop.hidden;
        break; // 再描画しない
      }
      case 'palette-set': {
        const it = itemIndex[btn.dataset.item];
        if(it) it.color = btn.dataset.color || undefined;
        renderAll(); break;
      }
      case 'numpick-open': {
        const pop = btn.parentElement.querySelector('.numpick-pop');
        if(pop) pop.hidden = !pop.hidden;
        break; // 再描画しない
      }
      case 'numpick-set': {
        const hid = document.getElementById(btn.dataset.target);
        if(hid){ hid.value = btn.dataset.val; }
        const wrap = btn.closest('.numpick');
        const lbl = wrap.querySelector('.numpick-btn'); if(lbl) lbl.textContent = btn.dataset.val;
        const pop = wrap.querySelector('.numpick-pop'); if(pop) pop.hidden = true;
        break; // 再描画しない
      }
      case 'numpick-free': {
        const wrap = btn.closest('.numpick');
        const inp = wrap.querySelector('.np-free-input');
        let v = parseInt(inp.value, 10);
        if(isNaN(v) || v < 0){ inp.focus(); break; }
        const hid = document.getElementById(btn.dataset.target);
        if(hid){ hid.value = v; }
        const lbl = wrap.querySelector('.numpick-btn'); if(lbl) lbl.textContent = v;
        const pop = wrap.querySelector('.numpick-pop'); if(pop) pop.hidden = true;
        break; // 再描画しない
      }
      case 'track-palette-open': {
        const pop = btn.closest('.track').querySelector('.track-palette');
        if(pop) pop.hidden = !pop.hidden;
        break; // 再描画しない
      }
      case 'track-palette-set': {
        const t = CC().tracks.find(x => x.id === tid);
        if(t) t.color = btn.dataset.color || undefined;
        renderAll(); break;
      }
      case 'set-theme': break; // change で処理
      case 'report': document.getElementById('report-'+tid).innerHTML = `<div class="report-out">${escapeHtml(buildReport(c.tracks.find(t=>t.id===tid)))}</div>`; break;
      case 'memo': case 'memo-add': {
        const input = document.getElementById('memoInput-'+tid);
        const text = (input.value||'').trim();
        if(!text){ input.focus(); break; }
        const k = memoKey(tid);
        (app.memos[k] = app.memos[k] || []).push({ text, ts:new Date().toLocaleString('ja-JP',{hour12:false}) });
        renderAll(); break;
      }
    }
    return;
  }

  // 設定パネル・詳細パネル内のクリックはトグルさせない
  if(e.target.closest('.settings-panel') || e.target.closest('.detail') || e.target.closest('.newtrack-card') || e.target.closest('.topbar')) return;
  // 直前のドラッグ操作のあとに発火するクリックは無視（並べ替えで展開を暴発させない）
  if(Date.now() - dragEndedAt < 250) return;

  const card = e.target.closest('.track');
  if(card && card.dataset.track){
    const tid = card.dataset.track;
    openTrackId = (openTrackId === tid) ? null : tid;
    renderAll();
  }
});

/* ---- ドラッグでタスクカードを並べ替え ---- */
let dragTrackId = null;
let dragEndedAt = 0;

function reorderTrack(fromId, toId){
  const arr = CC().tracks;
  const fi = arr.findIndex(t => t.id === fromId);
  if(fi < 0) return;
  const moved = arr.splice(fi, 1)[0];
  const ti = arr.findIndex(t => t.id === toId);
  arr.splice(ti < 0 ? arr.length : ti, 0, moved);
  renderAll();
}

document.addEventListener('dragstart', e => {
  const h = e.target.closest('[data-toggle]');
  if(!h){ return; }
  dragTrackId = h.dataset.toggle;
  e.dataTransfer.effectAllowed = 'move';
  try{ e.dataTransfer.setData('text/plain', dragTrackId); }catch(_){}
  const card = h.closest('.track');
  if(card) card.classList.add('dragging');
});
document.addEventListener('dragover', e => {
  if(!dragTrackId) return;
  const card = e.target.closest('.track');
  if(card){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
});
document.addEventListener('drop', e => {
  if(!dragTrackId) return;
  const card = e.target.closest('.track');
  if(card && card.dataset.track && card.dataset.track !== dragTrackId){
    e.preventDefault();
    reorderTrack(dragTrackId, card.dataset.track);
  }
  dragTrackId = null;
  dragEndedAt = Date.now();
});
document.addEventListener('dragend', () => {
  dragTrackId = null;
  dragEndedAt = Date.now();
  const d = document.querySelector('.track.dragging');
  if(d) d.classList.remove('dragging');
});

/* ---- 小タスクの並べ替え（行のハンドル） ---- */
let itemDragId = null;
document.addEventListener('dragstart', e => {
  const h = e.target.closest('[data-itemdrag]');
  if(!h) return;
  itemDragId = h.dataset.itemdrag;
});
document.addEventListener('dragover', e => {
  if(!itemDragId) return;
  if(e.target.closest('.item-row')) e.preventDefault();
});
document.addEventListener('drop', e => {
  if(!itemDragId) return;
  const row = e.target.closest('.item-row');
  if(row && row.dataset.item && row.dataset.item !== itemDragId){
    e.preventDefault();
    const arr = CC().tracks.flatMap(t => t.items.includes(itemIndex[itemDragId]) ? [t] : []);
    const track = arr[0];
    if(track){
      const fi = track.items.findIndex(x => x.id === itemDragId);
      const moved = track.items.splice(fi, 1)[0];
      const ti = track.items.findIndex(x => x.id === row.dataset.item);
      track.items.splice(ti < 0 ? track.items.length : ti, 0, moved);
      renderAll();
    }
  }
  itemDragId = null;
});
document.addEventListener('dragend', () => { itemDragId = null; });

/* ---- マイルストーンの並べ替え（横並びドラッグ） ---- */

/* ---- ガントバー：ドラッグで移動・端で長さ変更（縦/横 両対応）＋スプリッター＋複数日バー ---- */
let gDrag = null;
let splitDrag = false;
let spanDrag = null;

document.addEventListener('mousedown', e => {
  // 左右分割スプリッター
  if(e.target.closest('#splitter')){ splitDrag = true; e.preventDefault(); return; }
  // 複数日バー（日単位で移動・期間変更）
  const sbar = e.target.closest('.span-bar');
  if(sbar && !e.target.closest('.span-ctrls')){
    const span = (CC().spans||[]).find(x => x.id === sbar.dataset.span);
    if(span){
      const row = sbar.closest('.span-row');
      const colW = (row.getBoundingClientRect().width - 24) / 7; // 先頭24pxガターを除く
      const mode = e.target.closest('.span-handle.left') ? 'L'
                 : e.target.closest('.span-handle.right') ? 'R' : 'move';
      spanDrag = { mode, startX:e.clientX, span, baseStr:ymd(weekBase()), colW,
        origStart:span.startDate, origEnd:span.endDate, el:sbar, cur:{ start:span.startDate, end:span.endDate } };
      e.preventDefault();
    }
    return;
  }
  // ガントバー
  const body = e.target.closest('.gblock');
  if(!body || e.target.closest('.gctrls')) return;
  const blocks = (CC().schedule||{})[app.selectedDate] || [];
  const blk = blocks.find(b => b.id === body.dataset.block);
  if(!blk) return;
  const vert = app.ganttOrient === 'vertical';
  const lane = body.closest(vert ? '.lanecol' : '.lanerow');
  const rect = lane.getBoundingClientRect();
  const pxPerMin = (vert ? rect.height : rect.width) / 1440;
  gDrag = {
    vert, mode: e.target.closest('.ghandle') ? 'resize' : 'move',
    startPos: vert ? e.clientY : e.clientX,
    origStart: blk.start, origDur: blk.dur,
    pxPerMin, el: body, blk, cur: { start: blk.start, dur: blk.dur },
  };
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if(splitDrag){
    const wrap = document.getElementById('wrap');
    const rect = wrap.getBoundingClientRect();
    let ratio = (e.clientX - rect.left) / rect.width;
    ratio = Math.min(0.75, Math.max(0.25, ratio));
    app.splitRatio = ratio;
    document.getElementById('boardCol').style.flex = `${ratio} 1 0`;
    document.getElementById('timeCol').style.flex = `${1-ratio} 1 0`;
    return;
  }
  if(spanDrag){
    let dCols = Math.round((e.clientX - spanDrag.startX) / spanDrag.colW);
    const base = spanDrag.baseStr;
    const ds0 = dayDiff(spanDrag.origStart, base), de0 = dayDiff(spanDrag.origEnd, base);
    let ns = spanDrag.origStart, ne = spanDrag.origEnd;
    if(spanDrag.mode === 'move'){
      dCols = Math.max(-de0, Math.min(6 - ds0, dCols)); // 週内に1日でも残す
      ns = addDays(spanDrag.origStart, dCols);
      ne = addDays(spanDrag.origEnd, dCols);
    } else if(spanDrag.mode === 'L'){
      ns = addDays(spanDrag.origStart, dCols);
      if(dayDiff(spanDrag.origEnd, ns) < 0) ns = spanDrag.origEnd; // start<=end
    } else {
      ne = addDays(spanDrag.origEnd, dCols);
      if(dayDiff(ne, spanDrag.origStart) < 0) ne = spanDrag.origStart; // end>=start
    }
    spanDrag.cur = { start: ns, end: ne };
    const vs = Math.max(0, dayDiff(ns, base)), ve = Math.min(6, dayDiff(ne, base));
    spanDrag.el.style.gridColumn = `${vs+2}/${ve+3}`;
    const t = spanDrag.el.querySelector('.span-title');
    if(t) t.textContent = spanDrag.span.title;
    return;
  }
  if(!gDrag) return;
  const pos = gDrag.vert ? e.clientY : e.clientX;
  const dMin = Math.round((pos - gDrag.startPos) / gDrag.pxPerMin / 15) * 15; // 15分スナップ
  if(gDrag.mode === 'move'){
    const s = Math.min(1440 - gDrag.origDur, Math.max(0, gDrag.origStart + dMin));
    gDrag.cur = { start: s, dur: gDrag.origDur };
  } else {
    const dur = Math.max(15, Math.min(1440 - gDrag.origStart, gDrag.origDur + dMin));
    gDrag.cur = { start: gDrag.origStart, dur };
  }
  if(gDrag.vert){
    gDrag.el.style.top = (gDrag.cur.start*MIN_V) + 'px';
    gDrag.el.style.height = Math.max(gDrag.cur.dur*MIN_V,16) + 'px';
  } else {
    gDrag.el.style.left = (gDrag.cur.start*MIN_H) + 'px';
    gDrag.el.style.width = Math.max(gDrag.cur.dur*MIN_H,22) + 'px';
  }
  const t = gDrag.el.querySelector('.gtitle');
  if(t) t.textContent = `${gDrag.blk.title} ${fmtMin(gDrag.cur.start)}-${fmtMin(gDrag.cur.start+gDrag.cur.dur)}${gDrag.blk.notify?' 🔔':''}`;
});

document.addEventListener('mouseup', () => {
  if(splitDrag){ splitDrag = false; return; }
  if(spanDrag){
    spanDrag.span.startDate = spanDrag.cur.start;
    spanDrag.span.endDate = spanDrag.cur.end;
    spanDrag = null;
    renderAll();
    return;
  }
  if(!gDrag) return;
  gDrag.blk.start = gDrag.cur.start;
  gDrag.blk.dur = gDrag.cur.dur;
  gDrag = null;
  renderAll();
});

 * 永続化（自分用・このブラウザのlocalStorageに保存）
 * ============================================================ */
const LS_KEY = 'proodos_state_v1';

function stateObj(){
  return {
    v: 1,
    cases: app.cases,
    currentCaseId: app.currentCaseId,
    changeHistory: app.changeHistory,
    memos: app.memos,
    seq: { c:app.seqCase, m:app.seqMs, p:app.seqParty, t:app.seqTrack, i:app.seqItem },
  };
}
function stateJson(){ return JSON.stringify(stateObj(), null, 2); } // 人が読める・コピー用

function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(stateObj())); }
  catch(e){ /* 容量超過・無効化時は黙って継続 */ }
}

// テキスト（JSON文字列）から状態を復元。ファイル読込・コピペ復元の共通処理
function applyStateFromText(text){
  try{
    const d = JSON.parse(text);
    if(!d || !Array.isArray(d.cases) || !d.cases.length) return { ok:false, msg:'読み込めるデータが見つからなかったよ' };
    localStorage.setItem(LS_KEY, JSON.stringify(d));
    loadState();
    app.settingsOpen = false; app.backupOpen = false; openTrackId = null;
    renderAll();
    return { ok:true, msg:'読み込んだよ（' + app.cases.length + '件の案件）' };
  }catch(e){ return { ok:false, msg:'JSONの解析に失敗したよ' }; }
}

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const d = JSON.parse(raw);
    if(!d || !Array.isArray(d.cases) || !d.cases.length) return false;
    app.cases = d.cases;
    app.currentCaseId = d.currentCaseId;
    app.changeHistory = d.changeHistory || [];
    app.memos = d.memos || {};
    if(d.seq){ app.seqCase=d.seq.c; app.seqMs=d.seq.m; app.seqParty=d.seq.p; app.seqTrack=d.seq.t; app.seqItem=d.seq.i; }
    if(!app.cases.find(c => c.id === app.currentCaseId)) app.currentCaseId = app.cases[0].id;
    return true;
  }catch(e){ return false; }
}

// バックアップ書き出し（自分のデータをJSONファイルへ）
function exportJson(){
  const data = localStorage.getItem(LS_KEY) || JSON.stringify(stateObj());
  const blob = new Blob([data], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'proodos_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// バックアップ読み込み（別PCへの引き継ぎ等）
function importJson(file){
  const reader = new FileReader();
  reader.onload = () => { alert(applyStateFromText(reader.result).msg); };
  reader.readAsText(file);
}

function birdGridToSVG(grid){
  const cols = grid[0].length, rows = grid.length, px = 7;
  let cells = '';
  for(let r=0;r<rows;r++) for(let i=0;i<cols;i++){
    const col = BIRD_COLORS[grid[r][i]];
    if(col) cells += `<rect x="${i*px}" y="${r*px}" width="${px}" height="${px}" fill="${col}"/>`;
  }
  return `<svg viewBox="0 0 ${cols*px} ${rows*px}" width="${cols*px}" height="${rows*px}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${cells}</svg>`;
}
function birdEdit(edits){
  const g = BIRD_BASE.map(r => r.split(''));
  edits.forEach(([r,c,ch]) => { if(g[r] && c < g[r].length) g[r][c] = ch; });
  return g.map(r => r.join(''));
}

let birdPoses = [], birdPets = [], birdRevertTimer = null, birdInited = false;
function birdTry(n, isPet){
  const url = BIRD_IMG_BASE + 'bird-' + String(n).padStart(2,'0') + '.png';

  img.onload = () => {

  for(let n=1;n<=BIRD_POSE_COUNT;n++) birdTry(n, false);
  for(let n=BIRD_PET_FROM;n<=BIRD_PET_TO;n++) birdTry(n, true);
}

function birdPet(){
  if(birdPets.length) birdShowURL(birdPets[Math.floor(Math.random()*birdPets.length)]); // 撫でられをランダム
  else birdShowSVG(BIRD_PETTED);
  clearTimeout(birdRevertTimer);
  birdRevertTimer = setTimeout(birdRandom, 2600);
}
function birdOnTab(act){ if(BIRD_TAB_ACTIONS.has(act)){ clearTimeout(birdRevertTimer); setTimeout(birdRandom, 40); } }

(function initBird(){
  const el = document.createElement('div');
  el.className = 'bird-char'; el.id = 'birdChar'; el.title = 'クリックでなでなで';
  document.body.appendChild(el);
  birdRandom();      // まずフォールバックを表示
  birdPreload();     // 画像があれば検出して差し替え
  el.addEventListener('click', birdPet);
  setInterval(birdRandom, 60000); // 1分ごとにランダム差分
})();
</script>
</body>
